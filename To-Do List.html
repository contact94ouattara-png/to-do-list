<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="To-Do List.css" media="all" type="text/css">
    <title>To-Do List</title>
</head>
<body>
   <div class="todolist">

       <div class="titre">
           <h1>To-Do List App</h1>
       </div>
    <div class="titreInput">
        <div class="inputButton">
            <input type="text" id="spaceInput" placeholder="Ajouter une nouvelle tâche">
            <button class="add">Ajouter</button>
        </div>
        <div class="message"><h4>Veuillez ajouter une tâche.</h4></div>
    </div>

    <div class="spaceTask"></div>
    <div class="spaceFinishTask">
        <h3>Task finished</h3>
    </div>

   </div>
    <script src="To-Do List.js"></script>
</body>
</html>
